<article
  class="rounded-3xl border border-graySoft bg-light p-6 shadow-sm transition duration-300 hover:-translate-y-1 hover:shadow-lg"
>
  <div
    class="mb-5 flex h-14 w-14 items-center justify-center rounded-2xl"
    [ngClass]="{
      'bg-primary/10 text-primary': accent === 'primary',
      'bg-gold/15 text-gold': accent === 'gold'
    }"
  >
    <ng-container [ngSwitch]="icon">

      <svg
        *ngSwitchCase="'individual'"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.8"
        stroke="currentColor"
        class="h-7 w-7"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M9.813 15.904 9 18.75l-2.137-.713a4.5 4.5 0 0 1-2.786-5.728l2.714-8.143a4.5 4.5 0 0 1 5.728-2.786l8.143 2.714a4.5 4.5 0 0 1 2.786 5.728l-.713 2.137L18.75 9l-8.937 6.904Z"
        />
      </svg>

      <svg
        *ngSwitchCase="'couple'"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.8"
        stroke="currentColor"
        class="h-7 w-7"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M18 18.72a9.094 9.094 0 0 0 3.742-.479 3 3 0 0 0-4.682-2.72m.94 3.198.001.031c0 .225-.012.447-.035.666A11.944 11.944 0 0 1 12 21c-2.17 0-4.206-.58-5.966-1.584A6.062 6.062 0 0 1 6 18.75c0-.011 0-.021.001-.031m11.999 0A5.971 5.971 0 0 0 15 15.75a5.971 5.971 0 0 0-3-5.197m0 0A5.971 5.971 0 0 0 9 15.75a5.971 5.971 0 0 0-3 5.197m6-10.394a3.75 3.75 0 1 0 0-7.5 3.75 3.75 0 0 0 0 7.5Z"
        />
      </svg>

      <svg
        *ngSwitchCase="'family'"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.8"
        stroke="currentColor"
        class="h-7 w-7"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.951 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.072M15 19.128v.106A12.318 12.318 0 0 1 8.624 21 12.29 12.29 0 0 1 3 19.128v-.106a6.375 6.375 0 0 1 11.786-3.072M12 12.75a4.125 4.125 0 1 0 0-8.25 4.125 4.125 0 0 0 0 8.25Z"
        />
      </svg>

      <svg
        *ngSwitchCase="'teen'"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.8"
        stroke="currentColor"
        class="h-7 w-7"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M9 12.75 11.25 15 15 9.75m6 2.25a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
        />
      </svg>

      <svg
        *ngSwitchDefault
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.8"
        stroke="currentColor"
        class="h-7 w-7"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M12 6v6l4 2.25M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
        />
      </svg>

    </ng-container>
  </div>

  <h3 class="text-xl font-semibold text-primary">
    {{ title }}
  </h3>

  <p class="mt-3 text-sm leading-7 text-textSoft">
    {{ description }}
  </p>
</article>
